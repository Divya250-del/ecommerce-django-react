version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. RabbitMQ Message Broker (ADDED)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce_rabbitmq
    ports:
      - "5672:5672"   # Core application communication port
      - "15672:15672" # Management Web Dashboard port
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Django Backend Service (UPDATED)
  backend:
    build: ./backend/backend 
    command: sh -c "python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend/backend:/app
      - django_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy # Ensures RabbitMQ is fully up before Django connects

  # 4. Celery Worker Service (ADDED)
  celery_worker:
    build: ./backend/backend # Uses the exact same Dockerfile configuration as your backend
    command: celery -A backend worker --loglevel=info # 'backend' should match the folder containing celery.py
    volumes:
      - ./backend/backend:/app
      - django_media:/app/media
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - backend
      - db

  # 5. React Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - CHOKIDAR_USEPOLLING=true  # Forces hot-reloading to work inside Docker containers
    depends_on:
      - backend

volumes:
  postgres_data:
  django_media: