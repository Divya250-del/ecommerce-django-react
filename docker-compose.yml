version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: shop_admin
      POSTGRES_PASSWORD: super_secure_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Django Backend Service
  backend:
    build: ./backend/backend # Points to the first backend folder containing its Dockerfile
    volumes:
      - ./backend/backend:/app
      - django_media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=ecommerce_db
      - DB_USER=shop_admin
      - DB_PASSWORD=super_secure_password_123
    depends_on:
      - db

  # 3. React Frontend Service
  frontend:
    build: ./frontend # Points to your frontend folder containing its Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  django_media: